<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Numri atomik i hekurit</title>
  <desc id="desc">Ilustrim i atomit te hekurit me berthame dhe shenjen Fe 26.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#233147"/>
      <stop offset="1" stop-color="#101824"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#19d6b3"/>
      <stop offset="1" stop-color="#2f9cff"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg)"/>
  <g transform="translate(450 260)" fill="none" stroke="url(#cyan)" stroke-width="10" opacity=".9">
    <ellipse rx="260" ry="82"/>
    <ellipse rx="260" ry="82" transform="rotate(60)"/>
    <ellipse rx="260" ry="82" transform="rotate(120)"/>
  </g>
  <circle cx="450" cy="260" r="88" fill="#d0d7e2"/>
  <circle cx="420" cy="238" r="28" fill="#f2b84b"/>
  <circle cx="475" cy="242" r="26" fill="#67d7c5"/>
  <circle cx="445" cy="292" r="30" fill="#2f9cff"/>
  <g fill="#e9edf5" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="450" y="455" font-size="78" font-weight="700">Fe</text>
    <text x="555" y="432" font-size="42" font-weight="700">26</text>
  </g>
</svg>
